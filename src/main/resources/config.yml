configVersion: 4

claiming:
  enabled: true
  item: ECHO_SHARD
  consumeItem: true
  maxAllaysPerPlayer: 5
  allowClaimAlreadyHoldingItem: true

display:
  showName: true
  # Base name for freshly claimed Allays before a nickname is set.
  # Example with the default nameFormat: "Nils's Allay [Lv. 1]"
  defaultAllayName: "{owner}'s Allay"
  # Used while the Allay has no nickname. Placeholders: {owner}, {allay}, {nickname}, {level}
  # {allay} resolves to defaultAllayName here.
  nameFormat: "&b{allay} &7[Lv. {level}]"
  # Used only after a player explicitly sets a nickname with /ua rename, /ua nick or /ua nickname.
  # Example: "Elly [Lv. 1] · Nils"
  # Minecraft name tags do not support true font sizes, so this uses low-priority gray owner text.
  nicknameNameFormat: "&b{allay} &7[Lv. {level}] &8· &7{owner}"

follow:
  enabled: true
  checkIntervalTicks: 40
  teleportAfterDistance: 48.0
  teleportOnPlayerTeleport: true
  teleportOnWorldChange: true
  teleportOnJoin: true
  teleportOnRespawn: true

# Manual call/recall command.
# /ua call calls loaded owned Allays to the player.
# Home modes are skipped by default so STAY/COLLECT_AROUND_HOME are not pulled away accidentally.
# Use /ua call all to force-call all loaded owned Allays.
recall:
  enabled: true
  includeHomeModesByDefault: false

# Home is used by STAY and COLLECT_AROUND_HOME.
# Priority: player respawn point/bed -> nearby bed -> current Allay position.
home:
  usePlayerRespawnPoint: true
  searchNearbyBeds: true
  bedSearchRadius: 24
  fallbackToCurrentLocation: true
  returnDistance: 12.0

protection:
  preventOtherPlayersInteract: true
  preventOtherPlayersDamage: true
  ownerCanDamage: false

collection:
  enabled: true
  scanIntervalTicks: 30
  requireLoadedOwner: true
  dropToOwnerInventory: true
  maxItemsPerAllayPerScan: 8
  blacklist:
    - BEDROCK
    - BARRIER
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID

# Loaded Allays keep their real data on the entity via PDC.
# Packed Allays need a small external file because the entity is removed while packed.
# The mirror remains only a readable snapshot for admins/debugging/backups.
storage:
  # Actual storage for packed Allays because the entity is removed while packed.
  packedFile: data/packed-allays.yml

  mirror:
    enabled: true
    updateIntervalSeconds: 60
    file: data/allays.yml

levels:
  1:
    filterSlots: 1
    pickupRadius: 12.0
    carryStacks: 1
    teleportDistance: 48.0
  2:
    filterSlots: 3
    pickupRadius: 16.0
    carryStacks: 2
    teleportDistance: 64.0
  3:
    filterSlots: 5
    pickupRadius: 20.0
    carryStacks: 3
    teleportDistance: 80.0
  4:
    filterSlots: 9
    pickupRadius: 24.0
    carryStacks: 5
    teleportDistance: 96.0

upgradeCosts:
  2:
    items:
      EMERALD: 16
      AMETHYST_SHARD: 8
  3:
    items:
      EMERALD: 32
      DIAMOND: 4
      AMETHYST_SHARD: 16
  4:
    items:
      EMERALD_BLOCK: 4
      DIAMOND: 16
      ECHO_SHARD: 1

worlds:
  disabled:
    - example_disabled_world
